server.port=9080

# datebase configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/patientdb
spring.datasource.username=postgres
spring.datasource.password=root
spring.jpa.properties.hibernate.transaction.jta.platform=org.hibernate.engine.transaction.jta.platform.internal.NoJtaPlatform
spring.jpa.hibernate.ddl-auto=none

# Liquibase configuration
spring.liquibase.change-log=classpath:db/changelogs/db.changelog-master.xml
spring.liquibase.enabled=true

 # OAuth2 JWT Configuration (RSA key pair generated in-memory; see OAuth2Config.java)
app.oauth2.access-token-expiry-ms=900000
# 15 minutes
app.oauth2.refresh-token-expiry-ms=604800000
# 7 days
app.oauth2.issuer=eye-hospital-pms

# Logging — debug for tenant context and patient module
logging.level.com.eyehospital.pms.infrastructure.security.filter=DEBUG
logging.level.com.eyehospital.pms.module.patient=DEBUG

