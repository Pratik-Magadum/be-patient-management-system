server.port=9080
spring.jpa.hibernate.ddl-auto=none

# Liquibase configuration for test profile (uses separate test changelogs)
spring.liquibase.change-log=classpath:/db/changelogs/test-changelog-master.xml
spring.liquibase.enabled=true

# CORS allowed origin patterns
app.cors.allowed-origin-patterns=http://localhost:5173

# Swagger/OpenAPI Configuration
springdoc.swagger-ui.enabled=false
